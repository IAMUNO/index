<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" type="text/css" media="screen" href="./main.css" />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="./animation.css"
    />
    <style>
      .img_bookmark,
      .img_arrow,
      .img_account,
      .img_briefcase {
        width: 40px;
        height: 40px;
      }
      header {
        text-align: center;
        margin-top: 60px;
      }
      header .profile {
        width: 380px;
        height: 380px;
        border-radius: 50%;
        box-shadow: 0 6px 12px 0 rgba(0, 0, 0, 1),
          0 12px 24px 0 rgba(0, 0, 0, 0.3);
      }

      header .thumb_wrapper {
        position: relative;
        display: inline-block;
        margin-bottom: 40px;
        animation: slidedown2 1s;
        animation-fill-mode: both;
      }
      header .badge {
        width: 80px;
        height: 80px;
        font-size: 50px;
        position: absolute;
        top: 20px;
        right: 20px;
        background-color: red;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 6px 12px 0 rgba(100, 0, 0, 1);
        animation: slidedown2 1s;
        animation-fill-mode: both;
        animation-delay: 0.2s;
      }
      header .greeting {
        margin-bottom: 40px;
      }
      header .mail {
        padding: 8px 22px 10px 22px;
        border: 0.5px solid rgba(0, 0, 0, 0.05);
        display: inline-block;
        border-radius: 20px;
        background-color: rgba(0, 0, 0, 0.1);
        box-sizing: border-box;
        margin-top: 30px;
        animation: navup 1s;
        animation-fill-mode: both;
      }
      .list {
        margin-top: 30px;
      }
      .list .item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        font-size: 20px;
      }
      .list .item img {
        padding: 30px 22px;
      }
      .list .item .left {
        display: flex;
        align-items: center;
      }
      .list .item .left .name {
        margin-left: 6px;
      }
      .list .item .right {
        opacity: 0.5;
      }
      .list .item .right img {
        padding-right: 15px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="thumb_wrapper">
        <a href="./my-mdal.html"><img class="profile" src="./profile.jpg" /></a>
        <div class="badge">7</div>
      </div>
      <div class="text-area">
        <h2 class="greeting stagger-item">Hi, Everyone!</h2>
        <h3 class="desc stagger-item">
          당장은 떠날 수 없지만 우리 언젠가는 여행을 가지 않겠어요? <br />
          여행을 떠나고 싶은 사람들은 자유롭게 개인 페이지를 작성해보아요.
        </h3>
      </div>
      <div class="mail">
        <a href="mailto:tksxkrjs123@gmail.com">tksxkrjs123@gmail.com</a>
      </div>
    </header>
    <ul class="list">
      <li class="item mouse_effect">
        <div class="left">
          <img class="img_bookmark" src="./bookmark.svg" />
          <div class="name">Bookmark</div>
        </div>
        <div class="right">
          <img class="img_arrow" src="./right-arrow.svg" />
        </div>
      </li>
      <li class="item mouse_effect">
        <div class="left">
          <img class="img_account" src="./account.svg" />
          <div class="name">Account info</div>
        </div>
        <div class="right">
          <img class="img_arrow" src="./right-arrow.svg" />
        </div>
      </li>
      <li class="item mouse_effect">
        <div class="left">
          <img class="img_briefcase" src="./briefcase.svg" />
          <div class="name">Business</div>
        </div>
        <div class="right">
          <img class="img_arrow" src="./right-arrow.svg" />
        </div>
      </li>
    </ul>
    <nav class="gnb">
      <a href="./index.html" class="index mouse_effect"
        ><img src="./book.png"
      /></a>
      <a href="./Malaga.html" class="Malaga mouse_effect"
        ><img src="./Malaga.png"
      /></a>
      <a href="./Barcelona.html" class="Barcelona mouse_effect"
        ><img src="./Barcelona.png"
      /></a>
      <a href="./Sevilla.html" class="Sevilla mouse_effect"
        ><img src="./Sevilla.png"
      /></a>
      <a href="./Granada.html" class="Granada mouse_effect"
        ><img src="./Granada.png"
      /></a>
      <a href="./Madrid.html" class="Madrid mouse_effect"
        ><img src="./Madrid.png"
      /></a>
      <a href="./Lisbon.html" class="Lisbon mouse_effect"
        ><img src="./Lisbon.png"
      /></a>
      <a href="./Porto.html" class="Porto mouse_effect"
        ><img src="./Porto.png"
      /></a>
      <a href="./like.html" class="like mouse_effect"
        ><img src="./heart.png"
      /></a>
      <a href="./mypage.html" class="mypage mouse_effect active"
        ><img src="./man.png"
      /></a>
    </nav>
  </body>
</html>
